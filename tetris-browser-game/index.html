<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>俄罗斯方块</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="play-section" aria-label="俄罗斯方块游戏区">
        <div class="canvas-wrap">
          <canvas id="board" width="300" height="600" aria-label="主棋盘"></canvas>
          <div id="pauseOverlay" class="overlay hidden">
            <strong id="overlayTitle">暂停</strong>
            <span id="overlaySubtitle">按 P 或 Esc 继续</span>
          </div>
        </div>
      </section>

      <aside class="side-panel" aria-label="游戏状态">
        <div class="brand">
          <h1>俄罗斯方块</h1>
          <button id="restartBtn" type="button" title="重新开始">↻</button>
        </div>

        <div class="preview-grid">
          <section class="panel">
            <h2>下一个</h2>
            <canvas id="next" width="112" height="112" aria-label="下一个方块"></canvas>
          </section>
          <section class="panel">
            <h2>暂存</h2>
            <canvas id="hold" width="112" height="112" aria-label="暂存方块"></canvas>
          </section>
        </div>

        <dl class="stats">
          <div>
            <dt>分数</dt>
            <dd id="score">0</dd>
          </div>
          <div>
            <dt>等级</dt>
            <dd id="level">1</dd>
          </div>
          <div>
            <dt>行数</dt>
            <dd id="lines">0</dd>
          </div>
          <div>
            <dt>最佳</dt>
            <dd id="best">0</dd>
          </div>
        </dl>

        <div class="controls" aria-label="键盘控制">
          <span>← → 移动</span>
          <span>↑ / X 旋转</span>
          <span>Z 反转</span>
          <span>↓ 软降</span>
          <span>空格 硬降</span>
          <span>C / Shift 暂存</span>
          <span>P / Esc 暂停</span>
        </div>
      </aside>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
